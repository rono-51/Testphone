<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Clips - Kick</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-gray-800 pb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-green-400 flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-green-500 inline-block animate-pulse"></span>
                    Dashboard de Clips - Kick
                </h1>
                <p class="text-sm md:text-base text-gray-400 mt-1">Viendo clips de la semana ordenados por fecha</p>
            </div>
            
            <form id="search-form" class="flex w-full sm:w-auto gap-2">
                <input type="text" id="search-input" value="daarick" placeholder="Nombre del streamer..." 
                       class="bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:border-green-500 w-full sm:w-64 font-medium text-sm">
                <button type="submit" class="bg-green-500 hover:bg-green-600 text-gray-950 font-bold px-5 py-2 rounded-lg transition-colors text-sm">
                    Buscar
                </button>
            </form>
        </header>

        <div id="loading" class="text-center py-12">
            <p class="text-xl text-gray-400 animate-bounce">Buscando clips en Kick...</p>
        </div>

        <div id="error-msg" class="hidden bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-lg mb-6 text-sm md:text-base">
            No se pudieron cargar los clips. Verifica que el nombre del streamer esté bien escrito o que el canal tenga clips públicos creados esta semana.
        </div>

        <div id="clips-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="video-modal" class="hidden fixed inset-0 z-50 bg-black/95 items-center justify-center p-2 sm:p-4 transition-opacity duration-300">
        <button id="close-modal-btn" class="absolute top-3 right-3 bg-gray-800/80 hover:bg-red-600 text-white font-bold w-10 h-10 rounded-full transition-colors z-50 text-base flex items-center justify-center focus:outline-none backdrop-blur-sm">
            ✕
        </button>
        <div class="relative w-full max-w-4xl bg-gray-900 rounded-xl overflow-hidden shadow-2xl border border-gray-800 my-auto">
            <div class="w-full bg-black flex items-center justify-center overflow-hidden">
                <div id="player-container" class="w-full aspect-video">
                    </div>
            </div>
            <div class="p-4 bg-gray-800">
                <h2 id="modal-video-title" class="text-base md:text-xl font-bold text-white truncate">Título del Clip</h2>
                <div class="flex justify-between items-center mt-1">
                    <p id="modal-video-author" class="text-xs md:text-sm text-gray-400">Creado por: --</p>
                    <p id="modal-video-time" class="text-[10px] md:text-xs text-green-400 font-medium">Hace --</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_BASE_URL = 'https://kick-clips-proxy.clips-tt-ron21.workers.dev/'; 

        const clipsContainer = document.getElementById('clips-container');
        const loadingElement = document.getElementById('loading');
        const errorElement = document.getElementById('error-msg');
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');

        const videoModal = document.getElementById('video-modal');
        const playerContainer = document.getElementById('player-container');
        const modalTitle = document.getElementById('modal-video-title');
        const modalAuthor = document.getElementById('modal-video-author');
        const modalTime = document.getElementById('modal-video-time');
        const closeModalBtn = document.getElementById('close-modal-btn');

        let activeClipsList = [];

        // FUNCIÓN CORREGIDA PARA CALCULAR EL TIEMPO TRANSCURRIDO
        function getRelativeTime(dateString) {
            if (!dateString) return "Tiempo desconocido";
            
            const createdDate = new Date(dateString);
            const now = new Date();
            const diffMs = now - createdDate;
            
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60); // Corregido: 60 min = 1 hora
            const diffDays = Math.floor(diffHours / 24);

            if (diffMins < 1) return "Hace unos instantes";
            if (diffMins < 60) return `Hace ${diffMins} min`;
            if (diffHours < 24) return `Hace ${diffHours} ${diffHours === 1 ? 'hora' : 'horas'}`;
            return `Hace ${diffDays} ${diffDays === 1 ? 'día' : 'días'}`;
        }

        async function fetchClips(streamerName) {
            loadingElement.classList.remove('hidden');
            errorElement.classList.add('hidden');
            clipsContainer.innerHTML = '';

            const finalUrl = `${WORKER_BASE_URL}?streamer=${encodeURIComponent(streamerName.trim().toLowerCase())}`;

            try {
                const response = await fetch(finalUrl);
                if (!response.ok) throw new Error(`Error en el Worker: ${response.status}`);

                const data = await response.json();
                const clips = data.clips || data.data || []; 
                
                activeClipsList = clips;

                if (clips.length === 0) {
                    clipsContainer.innerHTML = `<p class="text-gray-400 col-span-full text-center">No se encontraron clips recientes para "${streamerName}" esta semana.</p>`;
                    return;
                }

                renderClips(clips);
            } catch (error) {
                console.error("Error al obtener los clips:", error);
                errorElement.classList.remove('hidden');
            } finally {
                loadingElement.classList.add('hidden');
            }
        }

        function renderClips(clips) {
            clips.forEach((clip, index) => {
                const title = clip.title || 'Clip sin título';
                const thumbnail = clip.thumbnail_url || 'https://via.placeholder.com/320x180?text=No+Thumbnail';
                const creator = clip.creator ? clip.creator.username : 'Usuario';
                const views = clip.views || 0;
                const timeAgo = getRelativeTime(clip.created_at);

                // Configuración inteligente del botón de descarga
                let downloadButtonHTML = '';
                if (clip.video_url && clip.video_url.includes('.mp4')) {
                    downloadButtonHTML = `
                        <a href="${clip.video_url}" download="kick-clip-${clip.id}.mp4" target="_blank" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-3 rounded-lg transition-colors text-xs text-center flex items-center justify-center gap-1">
                            📥 Descargar
                        </a>`;
                } else if (clip.id) {
                    // Si está protegido, redirigimos a la página externa del clip
                    downloadButtonHTML = `
                        <a href="https://kick.com/clips/${clip.id}" target="_blank" class="flex-1 bg-gray-600 hover:bg-gray-500 text-gray-200 font-medium py-2 px-3 rounded-lg transition-colors text-xs text-center flex items-center justify-center gap-1 opacity-80" title="Clip protegido por Kick, descarga externa">
                            🔗 Ver en Kick
                        </a>`;
                }

                const clipCard = `
                    <div class="bg-gray-800 rounded-xl overflow-hidden shadow-lg border border-gray-700 hover:border-green-500/50 transition-all duration-300 flex flex-col justify-between group">
                        <div class="cursor-pointer" onclick="openClipModal(${index})">
                            <div class="relative aspect-video bg-gray-900 overflow-hidden">
                                <img src="${thumbnail}" alt="${title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                                <span class="absolute bottom-2 right-2 bg-gray-900/80 text-[11px] px-2 py-1 rounded text-gray-300">
                                    👀 ${views} vistas
                                </span>
                            </div>
                            <div class="p-4">
                                <h3 class="font-semibold text-base md:text-lg text-white line-clamp-2 group-hover:text-green-400 transition-colors">
                                    ${title}
                                </h3>
                                <p class="text-xs md:text-sm text-gray-400 mt-2">Creado por: <span class="text-gray-200 font-medium">${creator}</span></p>
                            </div>
                        </div>
                        <div class="p-4 pt-0">
                            <div class="text-[11px] text-gray-500 mb-3 flex justify-between items-center">
                                <span>📅 Clip de la semana</span>
                                <span class="text-green-400 font-medium">${timeAgo}</span>
                            </div>
                            <div class="flex gap-2 w-full">
                                <button onclick="openClipModal(${index})" class="flex-[2] bg-gray-700 hover:bg-green-500 hover:text-gray-950 font-bold py-2 px-3 rounded-lg transition-colors text-xs flex items-center justify-center gap-1">
                                    ▶ Reproducir
                                </button>
                                ${downloadButtonHTML}
                            </div>
                        </div>
                    </div>
                `;
                clipsContainer.innerHTML += clipCard;
            });
        }

        // CONTROL DEL REPRODUCTOR RESPONSIVO
        window.openClipModal = function(index) {
            const clip = activeClipsList[index];
            if (!clip) return;

            const title = clip.title || 'Clip sin título';
            const creator = clip.creator ? clip.creator.username : 'Usuario';
            const timeAgo = getRelativeTime(clip.created_at);

            const videoUrl = clip.video_url;
            const clipId = clip.id;

            playerContainer.innerHTML = '';

            // Lógica de inyección adaptada para ser Full-Width y responsive
            if (videoUrl && videoUrl.includes('.mp4')) {
                playerContainer.innerHTML = `<video id="modal-player" src="${videoUrl}" controls autoplay class="w-full h-full object-contain"></video>`;
            } else if (clipId) {
                playerContainer.innerHTML = `
                    <iframe src="https://kick.com/embed/clips/${clipId}" 
                            class="w-full h-full absolute inset-0" 
                            style="border:0;"
                            scrolling="no" 
                            allowfullscreen="true">
                    </iframe>`;
                // Ajustamos posicionamiento absoluto para el contenedor interno del iframe responsivo
                playerContainer.classList.add('relative');
            } else {
                playerContainer.innerHTML = `<div class="p-8 text-center text-red-400 flex items-center justify-center h-full">No se pudo generar un reproductor compatible.</div>`;
            }

            modalTitle.innerText = title;
            modalAuthor.innerText = `Creado por: ${creator}`;
            modalTime.innerText = timeAgo;

            videoModal.classList.remove('hidden');
            videoModal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeClipModal() {
            playerContainer.innerHTML = ''; 
            playerContainer.classList.remove('relative');
            videoModal.classList.add('hidden');
            videoModal.classList.remove('flex');
            document.body.style.overflow = '';
        }

        closeModalBtn.addEventListener('click', closeClipModal);
        videoModal.addEventListener('click', (e) => {
            if (e.target === videoModal) closeClipModal();
        });

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const targetStreamer = searchInput.value;
            if (targetStreamer.trim() !== '') {
                fetchClips(targetStreamer);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            fetchClips(searchInput.value);
        });
    </script>
</body>
</html>
